<html>
<head>
<style>
div {
width:100px;
height:100px;
background:lavender;
color:voilet;
border:5px solid red;
transition-duration:2s;
}
#rotateX:hover {
transform:rotateX(140deg);
}
#rotateY:hover {
transform:rotateY(140deg);
}
#rotateZ:hover {
transform:rotateZ(90deg);
}
</style>
</head>
<body>
<div id="rotateX">rotate me! </div> <br>
<div id="rotateY">rotate me! </div> <br>
<div id="rotateZ">rotate me! </div> 
</body>
</html>
